    container_name: smartrent-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_DEV_PORT:-6380}:6379"  # Different port to avoid conflicts
    volumes:
      - redis_dev_data:/data
    networks:
      - smartrent-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: ${REDIS_HEALTH_CHECK_INTERVAL:-30}s
      timeout: ${REDIS_HEALTH_CHECK_TIMEOUT:-3}s
      retries: ${REDIS_HEALTH_CHECK_RETRIES:-3}

  # phpMyAdmin for database management (development only)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: smartrent-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql-dev
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-root}
      PMA_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      - mysql-dev
    networks:
      - smartrent-dev-network

  # Redis Commander for Redis management (development only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: smartrent-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis-dev:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-8082}:8081"
    depends_on:
      - redis-dev
    networks:
      - smartrent-dev-network

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  smartrent-dev-network:
    driver: bridge
