name: Java CI with Gradle

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ./smart-rent 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('smart-rent/**/gradle-wrapper.properties') }}-${{ hashFiles('smart-rent/**/*.gradle*', 'smart-rent/**/buildSrc/**/*.kt') }}
        restore-keys: |
          gradle-${{ runner.os }}-
          gradle-

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build and Run unit tests with coverage
      run: |
        ./gradlew build jacocoTestReport \
          --no-daemon \
          --parallel \
          --build-cache \
          --continue

  docker:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./smart-rent 
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        IMAGE_NAME="vuhuydiet/smart-rent"
        COMMIT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
        ENV_TAG="dev"

        echo "Building image $IMAGE_NAME:$COMMIT_SHA and $IMAGE_NAME:$ENV_TAG"

        docker build \
          -f ../Dockerfile \
          -t $IMAGE_NAME:$COMMIT_SHA \
          -t $IMAGE_NAME:$ENV_TAG \
          ..

        docker push $IMAGE_NAME:$COMMIT_SHA
        docker push $IMAGE_NAME:$ENV_TAG

  update-deployment:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
    - name: Checkout deployment repository
      uses: actions/checkout@v4
      with:
        repository: 'Vuhuydiet/smartrent-deploy'
        token: ${{ secrets.DEPLOY_REPO_TOKEN }}
        path: 'deploy-repo'

    - name: Update image tags in values.yaml
      run: |
        COMMIT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
        VALUES_FILE="deploy-repo/charts/smartrent/environments/dev/values.yaml"
        
        echo "Updating image tags to: $COMMIT_SHA"
        
        # Update BEServer image tag
        # sed -i "s/^  tag: .*/  tag: $COMMIT_SHA/" $VALUES_FILE
        
        sed -i '/^BEServer:/,/^[A-Za-z]/ s/^    tag: .*/    tag: '$COMMIT_SHA'/' $VALUES_FILE
        # sed -i '/^AIServer:/,/^[A-Za-z]/ s/^    tag: .*/    tag: '$COMMIT_SHA'/' $VALUES_FILE
        
        echo "Updated values.yaml content:"
        cat $VALUES_FILE

    - name: Commit and push changes
      run: |
        cd deploy-repo
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add charts/smartrent/environments/dev/values.yaml
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        
        COMMIT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
        BACKEND_COMMIT_MSG=$(git log -1 --pretty=%B)
        BACKEND_COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
        git commit -m "$COMMIT_SHA: $BACKEND_COMMIT_MSG $BACKEND_COMMIT_URL"
        git push