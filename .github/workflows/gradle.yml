name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ./smart-rent  # Thư mục gốc là smart-rent

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('smart-rent/**/gradle-wrapper.properties') }}-${{ hashFiles('smart-rent/**/*.gradle*', 'smart-rent/**/buildSrc/**/*.kt') }}
        restore-keys: |
          gradle-${{ runner.os }}-
          gradle-

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Assemble only (skip tests)
      run: |
        ./gradlew assemble \
          --no-daemon \
          --parallel \
          --build-cache \
          --configuration-cache

    - name: Run unit tests with coverage
      run: |
        ./gradlew test jacocoTestReport \
          --no-daemon \
          --parallel \
          --build-cache \
          --continue

