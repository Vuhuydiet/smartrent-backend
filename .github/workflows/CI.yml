name: CI

# Continuous Integration — the merge gate.
# Builds + runs unit tests (with coverage) on every PR into main. Image build
# + deploy live in cd.yml and run only AFTER merge. Enable branch protection
# so this check must pass before a PR can merge → main only contains tested code.

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./smart-rent

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('smart-rent/**/gradle-wrapper.properties') }}-${{ hashFiles('smart-rent/**/*.gradle*', 'smart-rent/**/buildSrc/**/*.kt') }}
        restore-keys: |
          gradle-${{ runner.os }}-
          gradle-

    - name: Build and run unit tests with coverage
      run: |
        chmod +x gradlew
        ./gradlew build jacocoTestReport \
          --no-daemon \
          --parallel \
          --build-cache \
          --continue
